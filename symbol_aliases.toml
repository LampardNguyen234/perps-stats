# Symbol alias map — maps global symbol names to exchange-specific base names.
#
# Use the lowercase factory exchange name as the section header.
# Each entry: GLOBAL_NAME = "exchange_base_name"
#
# Example: gold is listed as "GOLD" on QFEX but as "XAU" elsewhere.
# With the config below, passing "XAU" to any command will automatically
# resolve to "GOLD" on QFEX and "XAU" on all other exchanges.
#
# Adding new tokens requires only editing this file — no code changes needed.

[binance]
XCU = "COPPER"
PLATINUM = "XPT"
PALLADIUM = "XPD"
BRENTOIL = "BZ"

[extended]
NVDA = "NVDA_24_5"
AAPL = "NVDA_24_5"
GOOGL = "GOOG"
META = "META_24_5"
HOOD = "HOOD_24_5"
TSLA = "TSLA_24_5"
MSFT = "MSFT_24_5"
INTC = "INTC_24_5"
SNDK = "SNDK_24_5"
COIN = "COIN_24_5"
NATGAS = "XNG"
CL = "WTI"
SP500 = "SPX"
BRENTOIL = "XBR"
